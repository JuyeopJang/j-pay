spring:
  application:
    name: transfer-service

  datasource:
    url: jdbc:mysql://localhost:3306/transfer_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectTimeout=3000&socketTimeout=5000
    username: jpay
    password: jpay
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: transfer-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8082
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 50

app:
  snowflake:
    node-id: 3  # payment-api=2, ledger-service=1, transfer-service=3

resilience4j:
  circuitbreaker:
    instances:
      externalBank:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50             # 10회 중 5회 실패 시 OPEN
        slow-call-rate-threshold: 50           # 10회 중 5회가 느린 응답이면 OPEN
        slow-call-duration-threshold: 3s       # readTimeout(5s) 이전에 감지
        wait-duration-in-open-state: 10s       # 10초 후 HALF_OPEN 시도
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      externalBank:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - juyeop.jpay.transfer.external.ExternalBankException
        ignore-exceptions:
          - juyeop.jpay.transfer.external.ExternalBankCircuitOpenException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
