spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:mysql://localhost:3308/ledger_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectTimeout=3000&socketTimeout=5000
    username: jpay
    password: jpay
    hikari:
      maximum-pool-size: 20   # charge 4 + payment 4 = 8 consumer 스레드 기준 여유 포함
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ledger-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # payload는 String으로 수신 후 @KafkaListener에서 ObjectMapper로 직접 역직렬화

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  snowflake:
    node-id: ${APP_SNOWFLAKE_NODE_ID:1}   # 다중 인스턴스 시 APP_SNOWFLAKE_NODE_ID 환경변수로 주입 (0~1023)

server:
  port: 8081
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
