spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:mysql://localhost:3306/ledger_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: jpay
    password: jpay
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

app:
  snowflake:
    node-id: 1   # 0~1023. 인스턴스마다 다르게 (env var로 주입 권장: APP_SNOWFLAKE_NODE_ID)

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always