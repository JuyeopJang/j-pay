spring:
  application:
    name: payment-api

  datasource:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mysql://localhost:3307/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectTimeout=3000&socketTimeout=5000
    username: jpay
    password: jpay
    hikari:
      maximum-pool-size: 50        # 25 вҶ’ 50 (л¶Җн•ҳ н…ҢмҠӨнҠё HikariCP pending 130+ н•ҙмҶҢ)
      minimum-idle: 10             # 5  вҶ’ 10
      connection-timeout: 3000     # н’Җм—җм„ң м»Өл„Ҙм…ҳмқ„ кё°лӢӨлҰ¬лҠ” мөңлҢҖ мӢңк°„(ms)
      idle-timeout: 600000         # мң нңҙ м»Өл„Ҙм…ҳ мң м§Җ мӢңк°„(ms) вҖ” 10л¶„
      max-lifetime: 1800000        # м»Өл„Ҙм…ҳ мөңлҢҖ мҲҳлӘ…(ms) вҖ” 30л¶„
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Outbox payloadлҠ” мқҙлҜё JSON л¬ёмһҗм—ҙлЎң м§Ғл ¬нҷ”лҗң мғҒнғң вҶ’ StringSerializerлЎң к·ёлҢҖлЎң м „мҶЎ

  data:
    redis:
      host: localhost
      port: 6379
      # Redissonмқҙ м»Өл„Ҙм…ҳ н’Җмқ„ м§Ғм ‘ кҙҖлҰ¬ вҶ’ Lettuce pool м„Өм • л¶Ҳн•„мҡ”

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  snowflake:
    node-id: ${APP_SNOWFLAKE_NODE_ID:2}   # лӢӨмӨ‘ мқёмҠӨн„ҙмҠӨ мӢң APP_SNOWFLAKE_NODE_ID нҷҳкІҪліҖмҲҳлЎң мЈјмһ… (0~1023)
  redis:
    key-prefix: payment   # Redis нӮӨ л„Өмһ„мҠӨнҺҳмқҙмҠӨ вҖ” payment:idempotency:*, payment:lock:* лЎң кІ©лҰ¬

resilience4j:
  circuitbreaker:
    instances:
      bankTransfer:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 10
        register-health-indicator: true
  retry:
    instances:
      bankTransfer:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - juyeop.jpay.payment.bank.BankTransferException
        ignore-exceptions:
          - juyeop.jpay.payment.bank.BankCircuitOpenException

server:
  port: 8080
  shutdown: graceful
  tomcat:
    mbeanregistry:
      enabled: true
    threads:
      max: 200
      min-spare: 20
    accept-count: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
